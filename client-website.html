<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina | Dynamic Demo Store</title>
    
    <!-- Tailwind for basic store styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ========================================== -->
    <!-- 1. ECHOSTREAM SCRIPT                       -->
    <!-- (Placed in head with 'defer' so it loads  -->
    <!--  after our products are rendered)          -->
    <!-- ========================================== -->
    <script src="https://echo-stream-5nch.vercel.app/widget/echo-widget.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-900 pb-20 font-sans">

    <!-- Store Header -->
    <header class="bg-white border-b py-4 px-8 mb-10 shadow-sm sticky top-0 z-50">
        <h1 class="text-2xl font-black text-indigo-600 tracking-tighter">LUMINA.</h1>
    </header>

    <div class="max-w-5xl mx-auto px-6 mb-8">
        <h2 class="text-3xl font-black mb-2">Featured Collection</h2>
        <p class="text-gray-500">Products fetched dynamically from API and looped.</p>
    </div>

    <!-- The container where our JS loop will inject the products -->
    <main class="max-w-5xl mx-auto px-6" id="product-feed"></main>

    <script>
        // ==========================================
        // ⚙️ ECHOSTREAM CONFIGURATION
        // ==========================================
        const ECHOSTREAM_API_KEY = "20d10bd58a210131a6d17452ba382119"; // <-- Replace with your real key!
        
        // OPTIONAL: Simulate a logged-in buyer to test the secure UI!
        const LOGGED_IN_USER_NAME = "test user"; // e.g. "Bruce Wayne"
        const LOGGED_IN_USER_EMAIL = "test@example.com"; // e.g. "bruce@wayne.com"


        // ==========================================
        // 📦 DUMMY DATABASE (Simulating an API fetch)
        // ==========================================
        const fetchProductsFromBackend = () => {
            return[
                {
                    id: "headphones-neon-001",
                    title: "Neon Pulse Headphones",
                    price: "$299.00",
                    image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800&auto=format&fit=crop",
                    description: "Experience studio-quality sound with active noise cancellation."
                },
                {
                    id: "keyboard-mech-002",
                    title: "Quantum Mechanical Keyboard",
                    price: "$149.00",
                    image: "https://images.unsplash.com/photo-1595225476474-87563907a212?q=80&w=800&auto=format&fit=crop",
                    description: "Tactile, responsive, and fully customizable RGB. The ultimate tool for developers."
                }
            ];
        };

        // ==========================================
        // 🖥️ DYNAMIC RENDER LOOP
        // ==========================================
        const products = fetchProductsFromBackend();
        const feedContainer = document.getElementById('product-feed');
        let htmlContent = "";

        // Loop through the array and generate the HTML dynamically
        products.forEach(product => {
            htmlContent += `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-16 overflow-hidden">
                    
                    <!-- Product Details -->
                    <div class="flex flex-col md:flex-row gap-8 p-8">
                        <div class="w-full md:w-1/3 shrink-0">
                            <img src="${product.image}" alt="${product.title}" class="w-full rounded-xl object-cover aspect-square shadow-md" />
                        </div>
                        <div class="w-full md:w-2/3 flex flex-col justify-center">
                            <h2 class="text-3xl font-black mb-2">${product.title}</h2>
                            <p class="text-xl font-bold text-indigo-600 mb-4">${product.price}</p>
                            <p class="text-gray-600 text-lg leading-relaxed mb-6">${product.description}</p>
                            <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-all w-max">
                                Add to Cart
                            </button>
                        </div>
                    </div>

                    <!-- ========================================================= -->
                    <!-- 🚨 ECHOSTREAM WIDGET: Variables injected dynamically!     -->
                    <!-- ========================================================= -->
                    <div class="p-8 border-t border-gray-100 bg-gray-50/50">
                        <div 
                            class="echo-reviews-widget" 
                            data-api-key="${ECHOSTREAM_API_KEY}" 
                            data-product-handle="${product.id}" 
                            data-product-title="${product.title}"
                            data-customer-name="${LOGGED_IN_USER_NAME}" 
                            data-customer-email="${LOGGED_IN_USER_EMAIL}"
                        >
                        </div>
                    </div>

                </div>
            `;
        });

        // Inject everything into the page!
        feedContainer.innerHTML = htmlContent;

    </script>
</body>
</html>
